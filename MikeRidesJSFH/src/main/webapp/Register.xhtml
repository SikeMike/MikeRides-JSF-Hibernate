<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core">
<f:view>
	<h:head>
		<title>RIDES - Register</title>
		<h:outputStylesheet name="css/style.css" />
	</h:head>
	<h:body>
		<h:form>
			<div class="form-div">
				<h2>RIDES - Register</h2>
				<label for="username">Username:</label>
				<h:inputText id="username" value="#{register.username}"
					required="true" requiredMessage="Fill name field"
					validatorMessage="Username does not have the correct format">
					<f:validateRegex pattern="^[a-zA-Z0-9_]{3,15}$" />
					<f:ajax event="blur" render="mensajeusername" />
				</h:inputText>
				<h:message id="mensajeusername" for="username"
					styleClass="error-message" />

				<label for="password">Password:</label>
				<h:inputSecret id="password" value="#{register.password}"
					required="true" requiredMessage="Fill password field"
					validatorMessage="Password does not have the correct format">
					<f:validateRegex pattern="^[a-zA-Z0-9_]{6,18}$" />
					<f:ajax event="blur" render="mensajepassword" />
				</h:inputSecret>
				<h:message id="mensajepassword" for="password"
					styleClass="error-message" />
				<h:commandButton value="Register" action="#{register.register}" />
				<h:messages globalOnly="true" layout="list"
					styleClass="message-container" />
				<h:button value="Back" outcome="Index" />
			</div>
		</h:form>
	</h:body>
</f:view>
</html>
